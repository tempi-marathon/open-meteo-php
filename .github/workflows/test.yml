name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        testbench: ['^10.0', '^11.0']

    name: PHP ${{ matrix.php }} - Testbench ${{ matrix.testbench }}

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pcov
          coverage: pcov
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php${{ matrix.php }}-testbench${{ matrix.testbench }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php${{ matrix.php }}-

      - name: Constrain Testbench version
        run: composer require --dev "orchestra/testbench:${{ matrix.testbench }}" --no-update

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist

      - name: Audit dependencies
        run: composer audit

      - name: Run tests
        run: composer test

      - name: Run live smoke tests
        if: matrix.php == '8.5' && matrix.testbench == '^11.0'
        run: vendor/bin/pest --group=live
        continue-on-error: true

      - name: Run mutation tests
        if: matrix.php == '8.5' && matrix.testbench == '^11.0'
        run: composer test:mutation
        continue-on-error: true
